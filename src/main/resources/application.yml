spring:
  application:
    name: skmns-codingtest

  h2:
    console:
      enabled: true
      path: /skmns

  datasource:
    url: jdbc:h2:mem:skmns
    driver-class-name: org.h2.Driver
    username: skmns

  jpa:
    open-in-view: false              
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          '[import_files]': import.sql  
        '[format_sql]': true            
        '[show_sql]': true   
    defer-datasource-initialization: true

jwt:
    header: Authorization
    # skmns-coding-test-spring-boot-spring-security-jwt-token-kyoung-churl-lyu
    secret: c2ttbnMtY29kaW5nLXRlc3Qtc3ByaW5nLWJvb3Qtc3ByaW5nLXNlY3VyaXR5LWp3dC10b2tlbi1reW91bmctY2h1cmwtbHl1
    token-validity-in-seconds: 86400          

logging:
  level:
    '[com.skmns.codingtest]': DEBUG
